name: .NET CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: dotnet-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x

      - name: Restore
        run: dotnet restore ZPassFit.sln

      - name: Test with coverage
        run: >
          dotnet test ZPassFit.sln
          --no-restore
          --configuration Release
          --verbosity minimal
          --collect:"XPlat Code Coverage"
          --results-directory "${{ github.workspace }}/TestResults"

      - name: ReportGenerator
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: "${{ github.workspace }}/TestResults/**/coverage.cobertura.xml"
          targetdir: coveragereport
          reporttypes: MarkdownSummaryGithub

      - name: Assert coverage report
        run: test -f coveragereport/SummaryGithub.md

      - name: Add coverage to job summary
        run: |
          echo "## Code coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat coveragereport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on pull request
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: dotnet-coverage
          path: coveragereport/SummaryGithub.md

      - name: Comment on commit
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const { owner, repo } = context.repo;
            const branch = context.ref.replace("refs/heads/", "");
            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              head: `${owner}:${branch}`,
              state: "open"
            });
            if (prs.length > 0) {
              core.info("Skipping commit comment: open pull request exists for this branch.");
              return;
            }
            const body = fs.readFileSync("coveragereport/SummaryGithub.md", "utf8");
            await github.rest.repos.createCommitComment({
              owner,
              repo,
              commit_sha: context.sha,
              body: "## Code coverage\n\n" + body
            });

services:
  zpassfit-backend:
    image: zpassfit-backend
    build:
      context: .
      dockerfile: ZPassFit/Dockerfile

  zpassfit-postgres:
    image: postgres:alpine
    restart: unless-stopped
    pull_policy: build
    volumes:
      - zpassfit-postgres:/var/lib/postgresql
    env_file:
      - .env
    ports:
      - "5432:5432"
        
volumes:
  zpassfit-postgres:
